    <style>
      :root {
        background-color: #222;
        --theme: #2589f4;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family:
          'NanumSquare',
          -apple-system,
          sans-serif;
      }
      main {
        max-width: 30rem;
        margin: auto;
        padding: 0.5rem;
      }
      #root {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
      }
      div[data-container='card'] {
        border: 0.1rem solid var(--theme);
        border-radius: 0.5rem;
        background-color: #eee;

        overflow: hidden;
        > div {
          border-bottom: 0.1rem solid var(--theme);
          padding: 0.5rem;
        }
        div:last-child {
          border: none;
        }
      }
      .card-title {
        background-color: var(--theme);
        color: white;
        text-align: center;
        font-weight: bolder;
      }
      .card-top {
        display: flex;
        justify-content: space-between;
        .summary {
          display: flex;
          flex-direction: column;
          justify-content: space-between;
        }
        .title {
          text-align: right;
          div {
            font-size: 0.8rem;
          }
        }
      }
      .card-bottom {
        display: flex;
        flex-direction: column;
        gap: 0.2rem;
      }
      .card-url {
        display: flex;
        gap: 0.5rem;
        a {
          flex: 1;
          text-align: center;
          text-decoration: none;
          display: inline-block;

          border-radius: 0.2rem;
          padding: 0.5rem;
          background-color: var(--theme);

          color: white;
          font-size: 0.8rem;
        }
      }
      div[data-container='img'] {
        max-width: 4rem;
        display: flex;
        gap: 0.2rem;
        img {
          width: 100%;
        }
      }
      .card-bottom span:nth-of-type(2n) {
        color: gray;
        margin-bottom: 0.3rem;
        font-size: 0.8rem;
      }
      .card-bottom span:last-child {
        margin-bottom: 0;
      }
    </style>
