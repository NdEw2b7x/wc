    <style>
      :root {
        background-color: #222;
        --theme: #2589f4;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family:
          'NanumSquare',
          -apple-system,
          sans-serif;
      }
      main {
        max-width: 30rem;
        margin: auto;
        padding: 0.5rem;
      }
      #root {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
      }
      div[data-container='card'] {
        border: 0.1rem solid var(--theme);
        border-radius: 0.5rem;
        background-color: #eee;

        overflow: hidden;
        > div {
          border-bottom: 0.1rem solid var(--theme);
          padding: 0.5rem;
        }
        div:last-child {
          border: none;
        }
      }
      .card-title {
        background-color: var(--theme);
        color: white;
        text-align: center;
        font-weight: bolder;
      }
      .card-img {
        display: flex;
        justify-content: center;
        gap: 0.5rem;
        overflow: scroll;
        img {
          max-height: 8rem;
        }
      }
      .card-summary {
        padding: 0 !important;
        display: flex;
        justify-content: space-between;
        span {
          padding: 0.5rem;
          text-align: center;
          flex-grow: 1;
        }
        span:nth-child(2n-1) {
          background-color: var(--theme);
          color: white;
        }
      }
      .card-bottom {
        display: flex;
        flex-direction: column;
        gap: 0.2rem;
      }
      .card-url {
        display: flex;
        gap: 0.5rem;
        a {
          flex: 1;
          text-align: center;
          text-decoration: none;
          display: inline-block;

          border-radius: 0.2rem;
          padding: 0.5rem;
          background-color: var(--theme);

          color: white;
          font-size: 0.8rem;
        }
      }
      div[data-container='img'] {
        display: flex;
        gap: 0.2rem;
        img {
          max-height: 7rem;
          height: 100%;
        }
      }
      .card-bottom span:nth-of-type(2n) {
        color: gray;
        margin-bottom: 0.3rem;
        font-size: 0.8rem;
      }
      .card-bottom span:last-child {
        margin-bottom: 0;
      }
    </style>
